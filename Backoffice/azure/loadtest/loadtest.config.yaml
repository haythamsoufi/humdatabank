version: v0.1
displayName: Databank Load Test
description: "Backoffice staging load test: health, api/v1, navigation, entry-form, ajax save, optional submit"
testPlan: locustfile.py
testType: Locust
engineInstances: 1
env:
  - name: LOADTEST_HOST
    value: https://databank-stage.ifrc.org
  - name: LOADTEST_ALLOW_PROD
    value: 'false'
  # Optional: focal-point entry form traffic (requires authenticated session cookie).
  # Example: "123,456" (AssignmentEntityStatus IDs for focal-point assignments)
  - name: LOADTEST_HELP_DOC_PATH
    value: ''
  - name: LOADTEST_ASSIGNMENT_AES_IDS
    value: ''
  - name: LOCUST_USERS
    value: 20
  - name: LOCUST_SPAWN_RATE
    value: 1
  - name: LOCUST_RUN_TIME
    value: '120'
  - name: ENABLE_LOGGING
    value: 'true'
# Provision LOADTEST_API_KEY (and optionally LOADTEST_SESSION_COOKIE) as a
# Key Vault secret reference in Azure Load Testing rather than a literal value.
# Example secret entry (uncomment and set the secretId in the portal/CI):
# secrets:
#   - name: LOADTEST_API_KEY
#     value: https://<your-keyvault>.vault.azure.net/secrets/backoffice-loadtest-api-key
# For focal-point route testing without Key Vault, LOADTEST_SESSION_COOKIE can be
# passed as an env value at run/update time (short-lived; staging only).
resourceId: >-
  /subscriptions/f585c1c3-801b-4641-8d7f-145aa50ffb04/resourceGroups/ifrctgo001rg/providers/Microsoft.LoadTestService/loadtests/DatabankTest1
